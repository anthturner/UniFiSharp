name: Build and Test

on:
  push:
    branches: [ master ]
    paths:
      - 'UniFiSharp/**'
      - 'UniFiSharp.CLI/**'
      - 'UniFiSharp.DeviceTests/**'
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: |
          8.0.x
    - name: Restore dependencies
      run: dotnet restore
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal
